<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroChain — Farm to Buyer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>AgroChain</h1>
    <p>Connecting West African farmers directly to buyers</p>
  </header>

  <main>
    <div id="farmer-count"></div>
    <div id="listings-container"></div>

    <div id="controls">
      <input type="text" id="search" placeholder="Search by crop or farmer name..." />
      <button id="btn-available">Available Only</button>
      <button id="btn-reset">Reset</button>
    </div> 

  </main>

  <script src="script.js"></script>
</body>
</html>
